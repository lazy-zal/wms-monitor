<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Picking Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container py-3">
    <h4 class="mb-3 text-center"><i class="fa-solid fa-boxes-stacked text-primary"></i> Picking Monitor</h4>

    <div class="card shadow-sm mb-3">
        <div class="card-body p-2">
            <div class="input-group mb-2">
                <span class="input-group-text bg-white"><i class="fa-solid fa-search"></i></span>
                <input type="text" id="searchInput" class="form-control" placeholder="Cari No PL atau Tujuan...">
            </div>
            
            <div class="row g-2">
                <div class="col-4">
                    <input type="date" id="filterDate" class="form-control form-control-sm">
                </div>
                <div class="col-4">
                    <select id="filterStatus" class="form-select form-select-sm">
                        <option value="">Semua Status</option>
                        <option value="Waiting For Picking">Waiting for picking</option>
                        <option value="Picking Complete">Complete</option>
                        <option value="Progress">Progress</option>
                    </select>
                </div>
                <div class="col-4">
                    <select id="filterDest" class="form-select form-select-sm">
                        <option value="">Semua Tujuan</option>
                        </select>
                </div>
            </div>
        </div>
    </div>

    <div id="dataContainer" class="row g-2">
        <div class="text-center mt-5 text-muted">
            <div class="spinner-border spinner-border-sm" role="status"></div> Memuat data...
        </div>
    </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
