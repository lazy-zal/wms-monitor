<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WMS Picking Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="sticky-top-custom shadow-sm">
        <div class="container p-0">
            <h4 class="mb-3 text-center fw-bold">
                <i class="fa-solid fa-boxes-stacked text-primary"></i> Picking Monitor
            </h4>

            <div class="input-group mb-2">
                <span class="input-group-text bg-white border-end-0">
                    <i class="fa-solid fa-magnifying-glass text-muted"></i>
                </span>
                <input type="text" id="searchInput" class="form-control border-start-0 ps-0" placeholder="Cari No PL atau Tujuan...">
            </div>
            
            <div class="row g-2">
                <div class="col-5">
                    <input type="date" id="filterDate" class="form-control form-control-sm">
                </div>
                <div class="col-5">
                    <select id="filterStatus" class="form-select form-select-sm">
                        <option value="">Semua Status</option>
                        <option value="Waiting For Picking">Waiting</option>
                        <option value="Progress">Progress</option>
                        <option value="Complete">Complete</option>
                    </select>
                </div>
                <div class="col-2">
                    <button class="btn btn-sm btn-outline-primary w-100" onclick="location.reload()">
                        <i class="fa-solid fa-sync"></i>
                    </button>
                </div>
                <div class="col-12 mt-2">
                    <select id="filterDest" class="form-select form-select-sm">
                        <option value="">Semua Tujuan</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div class="container py-2">
        <div id="dataContainer" class="row g-2">
            <div class="text-center mt-5 text-muted">
                <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                <div class="mt-2" style="font-size: 12px;">Menghubungkan ke database...</div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
